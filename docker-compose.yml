version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=claraai123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
      # Optional: set your Groq API key for LLM extraction
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the pipeline code so n8n can execute it
      - ./:/data/clara-pipeline

volumes:
  n8n_data:
